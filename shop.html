<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POPPiT Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
<style>
/* ── RESET ─────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#0a0a0a;color:#f5f5f0;font-family:'DM Sans',sans-serif;overflow-x:hidden}
button{cursor:pointer;border:none;background:none}
::selection{background:#a81c1c;color:#fce588}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}

/* ── TOKENS ────────────────────────────────────────────────── */
:root{
  --black:#0a0a0a; --dark-gray:#1a1a1a; --mid-gray:#2a2a2a; --off-white:#f5f5f0;
  --red:#a81c1c; --deep-red:#7a1414;
  --gold-light:#f5d44b; --gold:#e8b820; --gold-dark:#c49518;
  --magenta:#ff2d7b; --electric:#00d4ff; --lime:#b8ff00; --yellow:#ffe600;
}
.gold-text{
  background:linear-gradient(180deg,#fce588 0%,#f5d44b 30%,#e8b820 65%,#c49518 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── ANIMATIONS ────────────────────────────────────────────── */
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes floatGummy{
  0%{transform:translateY(0) rotate(0deg)}
  100%{transform:translateY(-10px) rotate(4deg)}
}

/* ── TICKER ─────────────────────────────────────────────────── */
.ticker-wrap{
  background:var(--red);overflow:hidden;
  padding:8px 0;border-bottom:2px solid var(--gold-dark);
}
.ticker-track{
  display:flex;gap:32px;white-space:nowrap;
  animation:tickerScroll 30s linear infinite;
}
.ticker-item{
  font-family:'Oswald','Impact',sans-serif;font-size:13px;
  font-weight:700;letter-spacing:.12em;flex-shrink:0;
}

/* ── NAV ────────────────────────────────────────────────────── */
#shop-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--mid-gray);
}
.shop-nav-inner{
  max-width:1200px;margin:0 auto;padding:0 24px;
  height:60px;display:flex;align-items:center;justify-content:space-between;
}
.nav-logo-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Oswald','Impact',sans-serif;font-size:28px;
  font-weight:900;letter-spacing:.04em;
}
.nav-right-btns{display:flex;align-items:center;gap:24px}
.nav-shop-link{
  background:none;border:none;cursor:pointer;color:var(--gold);
  font-family:'Oswald','Impact',sans-serif;font-size:14px;
  font-weight:600;letter-spacing:.1em;text-transform:uppercase;
}
.cart-btn-shop{
  background:none;border:none;cursor:pointer;
  font-size:20px;position:relative;color:var(--off-white);
}
.cart-badge{
  position:absolute;top:-6px;right:-10px;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:800;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;
}

/* ── SHOP HERO ──────────────────────────────────────────────── */
.shop-hero{
  padding:80px 24px 60px;text-align:center;
  background:radial-gradient(ellipse at 50% 80%,rgba(168,28,28,.12) 0%,transparent 60%);
}
.shop-hero-eyebrow{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.2em;color:var(--gold);margin-bottom:12px;
  animation:fadeSlideUp .5s ease-out both;
}
.shop-hero-title{
  font-family:'Oswald','Impact',sans-serif;
  font-size:clamp(36px,6vw,56px);font-weight:900;
  letter-spacing:.02em;line-height:1.1;margin:0 0 16px;
  animation:fadeSlideUp .5s ease-out .1s both;
}
.shop-hero-sub{
  color:rgba(245,245,240,.55);font-size:16px;
  max-width:480px;margin:0 auto;line-height:1.6;
  animation:fadeSlideUp .5s ease-out .2s both;
}

/* ── PRODUCT GRID ───────────────────────────────────────────── */
.product-grid-wrap{max-width:900px;margin:0 auto;padding:0 24px 80px}
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:28px;
}

/* ── PRODUCT CARD ───────────────────────────────────────────── */
.product-card{
  cursor:pointer;background:var(--dark-gray);border-radius:16px;
  overflow:hidden;border:1px solid var(--mid-gray);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.product-card:hover{
  border-color:var(--gold);
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 30px rgba(245,212,75,.08);
}
.card-image{
  aspect-ratio:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.card-gummies{position:relative;width:200px;height:200px}
.card-gummy{
  position:absolute;width:60px;height:60px;border-radius:16px;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.product-card:hover .card-gummy{transform:rotate(var(--r)) scale(1.08) !important}
.save-badge{
  position:absolute;top:16px;right:16px;
  background:var(--red);color:#fff;
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:6px;letter-spacing:.05em;
}
.sour-badge{
  position:absolute;top:16px;left:16px;
  background:var(--yellow);color:var(--black);
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:800;
  padding:4px 10px;border-radius:6px;letter-spacing:.08em;
}
.card-info{padding:20px 24px 24px}
.card-subtitle{
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;
}
.card-name{
  font-family:'Oswald','Impact',sans-serif;font-size:28px;font-weight:900;
  letter-spacing:.02em;margin:0 0 8px;
}
.card-tagline{color:rgba(245,245,240,.55);font-size:14px;line-height:1.5;margin-bottom:16px}
.card-flavors{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.flavor-pill{
  display:flex;align-items:center;gap:6px;
  border-radius:20px;padding:4px 12px;
}
.flavor-dot-sm{width:8px;height:8px;border-radius:50%}
.flavor-pill-name{font-size:11px;font-weight:600}
.card-bottom{display:flex;align-items:center;justify-content:space-between}
.card-price-wrap{display:flex;align-items:baseline;gap:8px}
.card-price{font-family:'Oswald',sans-serif;font-size:28px;font-weight:800}
.card-compare{color:rgba(245,245,240,.28);font-size:16px;text-decoration:line-through}
.card-view-btn{
  background:var(--red);color:#fff;
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;
  padding:10px 20px;border-radius:8px;letter-spacing:.08em;transition:all .2s;
}
.product-card:hover .card-view-btn{box-shadow:0 4px 16px rgba(168,28,28,.4)}

/* ── TRUST STRIP ────────────────────────────────────────────── */
.trust-strip{
  border-top:1px solid var(--mid-gray);padding:40px 24px;
  display:flex;justify-content:center;gap:48px;flex-wrap:wrap;
}
.trust-item{text-align:center}
.trust-icon{font-size:28px;margin-bottom:6px}
.trust-label{
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.1em;color:rgba(245,245,240,.55);
  white-space:pre-line;line-height:1.4;text-transform:uppercase;
}

/* ── PRODUCT DETAIL ─────────────────────────────────────────── */
.detail-back-wrap{max-width:1100px;margin:0 auto;padding:20px 24px 0}
.detail-back-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(245,245,240,.4);font-family:'Oswald',sans-serif;
  font-size:13px;letter-spacing:.08em;
  display:flex;align-items:center;gap:6px;transition:color .2s;
}
.detail-back-btn:hover{color:var(--gold)}
.detail-grid{
  max-width:1100px;margin:0 auto;
  padding:20px 24px 80px;
  display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;
}

/* Gallery */
.gallery-main{
  aspect-ratio:1;border-radius:16px;border:1px solid var(--mid-gray);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;margin-bottom:12px;transition:background .3s;
}
.gallery-counter{
  position:absolute;bottom:12px;right:12px;
  color:rgba(245,245,240,.28);font-size:11px;
  font-family:'Oswald',sans-serif;letter-spacing:.1em;
}
.gallery-thumbs{display:flex;gap:8px}
.gallery-thumb{
  flex:1;aspect-ratio:1;border-radius:8px;cursor:pointer;
  border:2px solid var(--mid-gray);padding:0;
  display:flex;align-items:center;justify-content:center;transition:border-color .2s;
}
.gallery-thumb.active{border-color:var(--gold)}
.thumb-dot{width:16px;height:16px;border-radius:5px;opacity:.5}
.gallery-thumb.active .thumb-dot{opacity:1}

/* Info column */
.detail-subtitle{
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;
}
.detail-name{
  font-family:'Oswald','Impact',sans-serif;font-size:42px;font-weight:900;
  letter-spacing:.02em;margin:0 0 6px;line-height:1.1;
}
.detail-stars{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.stars-row{display:flex;gap:2px}
.star-icon{color:var(--gold-light);font-size:16px}
.detail-stars-note{color:rgba(245,245,240,.4);font-size:13px;font-family:'Oswald',sans-serif}
.detail-desc{color:rgba(245,245,240,.6);font-size:15px;line-height:1.65;margin-bottom:24px}
.highlights-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.highlight-row{display:flex;align-items:center;gap:12px}
.highlight-icon-box{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.highlight-label{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;
}
.highlight-detail{font-size:13px;color:rgba(245,245,240,.47);margin-left:6px}

/* What's in the box */
.whats-box{
  background:var(--dark-gray);border-radius:12px;padding:16px;
  margin-bottom:24px;border:1px solid var(--mid-gray);
}
.whats-box-label{
  font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.15em;color:rgba(245,245,240,.4);
  margin-bottom:10px;text-transform:uppercase;
}
.whats-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;
}
.whats-row+.whats-row{border-top:1px solid var(--mid-gray)}
.whats-left{display:flex;align-items:center;gap:10px}
.whats-dot{width:10px;height:10px;border-radius:50%}
.whats-name{color:var(--off-white);font-size:14px}
.whats-count{color:rgba(245,245,240,.4);font-size:13px;font-family:'Oswald',sans-serif}

/* Purchase toggle */
.purchase-toggle{display:flex;gap:10px;margin-bottom:20px}
.toggle-btn{
  flex:1;padding:12px 16px;border-radius:10px;cursor:pointer;
  text-align:left;transition:all .2s;position:relative;overflow:hidden;
}
.toggle-btn-label{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.05em;display:block;margin-bottom:2px;
}
.toggle-btn-price{color:rgba(245,245,240,.4);font-size:12px}
.best-value-tag{
  position:absolute;top:0;right:0;
  background:var(--gold);color:var(--black);
  font-size:9px;font-weight:800;padding:2px 8px;
  border-radius:0 8px 0 6px;font-family:'Oswald',sans-serif;
  letter-spacing:.05em;
}

/* Qty + Add to cart */
.purchase-row{display:flex;gap:12px;margin-bottom:16px}
.qty-control{
  display:flex;align-items:center;
  border:1px solid var(--mid-gray);border-radius:10px;overflow:hidden;
}
.qty-btn{
  width:40px;height:48px;background:var(--dark-gray);border:none;
  color:var(--off-white);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
.qty-btn:hover{background:var(--mid-gray)}
.qty-display{
  width:44px;height:48px;display:flex;align-items:center;justify-content:center;
  background:var(--black);color:var(--off-white);
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;
}
.add-to-cart-btn{
  flex:1;height:48px;background:var(--red);border:none;border-radius:10px;
  color:#fff;font-family:'Oswald','Impact',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:.1em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 4px 20px rgba(168,28,28,.44);
}
.add-to-cart-btn:hover{box-shadow:0 6px 28px rgba(168,28,28,.66);filter:brightness(1.1)}
.sub-note{
  color:rgba(245,245,240,.33);font-size:12px;text-align:center;
  font-style:italic;margin-bottom:8px;
}
.no-junk-strip{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-top:28px;padding:20px 0;border-top:1px solid var(--mid-gray);
}
.no-junk-tag{
  font-size:11px;font-family:'Oswald',sans-serif;font-weight:600;
  letter-spacing:.1em;color:rgba(245,245,240,.35);text-transform:uppercase;
}

/* ── CART DRAWER ────────────────────────────────────────────── */
.cart-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  animation:fadeIn .2s ease-out;cursor:pointer;display:none;
}
.cart-drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(420px,90vw);
  background:var(--dark-gray);z-index:201;
  display:none;flex-direction:column;
  animation:slideInRight .3s ease-out;
  box-shadow:-10px 0 40px rgba(0,0,0,.5);
}
.cart-drawer.open{display:flex}
.cart-overlay.open{display:block}
.cart-header{
  padding:20px 24px;border-bottom:1px solid var(--mid-gray);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:800;letter-spacing:.08em}
.cart-close{
  background:none;border:none;cursor:pointer;
  color:rgba(245,245,240,.4);font-size:24px;line-height:1;transition:color .2s;
}
.cart-close:hover{color:var(--off-white)}
.cart-items-list{flex:1;overflow:auto;padding:24px}
.cart-empty{text-align:center;padding:60px 20px;color:rgba(245,245,240,.28)}
.cart-empty-icon{font-size:48px;margin-bottom:16px}
.cart-empty-text{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:.08em}
.cart-item{
  background:var(--black);border-radius:12px;padding:16px;
  border:1px solid var(--mid-gray);margin-bottom:12px;
}
.cart-item-header{
  display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;
}
.cart-item-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:800}
.sub-tag{
  display:inline-block;margin-top:4px;
  background:rgba(232,184,32,.12);color:var(--gold);
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;
  font-family:'Oswald',sans-serif;letter-spacing:.08em;
}
.cart-remove{
  background:none;border:none;cursor:pointer;
  color:rgba(245,245,240,.28);font-size:16px;transition:color .2s;
}
.cart-remove:hover{color:var(--off-white)}
.cart-item-bottom{display:flex;align-items:center;justify-content:space-between}
.cart-qty{
  display:flex;align-items:center;
  border:1px solid var(--mid-gray);border-radius:6px;overflow:hidden;
}
.cart-qty-btn{
  width:28px;height:28px;background:var(--dark-gray);border:none;
  color:var(--off-white);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.cart-qty-num{
  width:32px;height:28px;display:flex;align-items:center;justify-content:center;
  color:var(--off-white);font-family:'Oswald',sans-serif;font-size:13px;
}
.cart-item-price{font-family:'Oswald',sans-serif;font-size:18px;font-weight:800}
.cart-footer{padding:24px;border-top:1px solid var(--mid-gray);display:none}
.cart-subtotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cart-subtotal-label{
  color:rgba(245,245,240,.55);font-family:'Oswald',sans-serif;
  font-size:14px;letter-spacing:.08em;
}
.cart-total-val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:800}
.checkout-btn{
  width:100%;height:52px;background:var(--red);border:none;border-radius:10px;
  color:#fff;font-family:'Oswald','Impact',sans-serif;font-size:16px;font-weight:800;
  letter-spacing:.12em;cursor:pointer;
  box-shadow:0 4px 20px rgba(168,28,28,.44);transition:all .2s;
}
.checkout-btn:hover{filter:brightness(1.1)}
.cart-free-ship{text-align:center;margin-top:10px;color:rgba(245,245,240,.28);font-size:11px}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:768px){
  .detail-grid{grid-template-columns:1fr}
  .product-grid{grid-template-columns:1fr}
  .trust-strip{gap:24px}
}
@media(max-width:600px){
  .purchase-toggle{flex-direction:column}
}
@media(prefers-reduced-motion:reduce){
  .ticker-track,.card-gummy,.add-to-cart-btn{animation:none!important}
  *{transition-duration:.01ms!important}
}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-track" id="ticker-track"></div>
</div>

<!-- NAV -->
<nav id="shop-nav">
  <div class="shop-nav-inner">
    <button class="nav-logo-btn gold-text" onclick="goHome()">POPPiT</button>
    <div class="nav-right-btns">
      <button class="nav-shop-link" onclick="showShopView()">Shop</button>
      <button class="cart-btn-shop" onclick="openCart()">
        🛒
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- ── SHOP VIEW ────────────────────────────────────────────── -->
<div id="view-shop">
  <section class="shop-hero">
    <div class="shop-hero-eyebrow">CHILDHOOD. UPGRADED.</div>
    <h1 class="shop-hero-title gold-text">PICK YOUR BOX</h1>
    <p class="shop-hero-sub">12 packs of protein-loaded gummy candy per box. Real candy taste. Real nutrition. No BS.</p>
  </section>
  <section class="product-grid-wrap">
    <div class="product-grid" id="product-grid"></div>
  </section>
  <section class="trust-strip" id="trust-strip"></section>
</div>

<!-- ── PRODUCT DETAIL VIEW ──────────────────────────────────── -->
<div id="view-product" style="display:none">
  <div class="detail-back-wrap">
    <button class="detail-back-btn" onclick="showShopView()">← BACK TO SHOP</button>
  </div>
  <div class="detail-grid">
    <div id="gallery-col">
      <div class="gallery-main" id="gallery-main">
        <div id="gallery-main-content"></div>
        <div class="gallery-counter" id="gallery-counter">1 / 5</div>
      </div>
      <div class="gallery-thumbs" id="gallery-thumbs"></div>
    </div>
    <div id="info-col"></div>
  </div>
</div>

<!-- ── CART ─────────────────────────────────────────────────── -->
<div id="cart-overlay" class="cart-overlay" onclick="closeCart()"></div>
<div id="cart-drawer" class="cart-drawer">
  <div class="cart-header">
    <span class="cart-title gold-text">YOUR CART</span>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items-list" id="cart-items-list"></div>
  <div class="cart-footer" id="cart-footer">
    <div class="cart-subtotal">
      <span class="cart-subtotal-label">SUBTOTAL</span>
      <span class="cart-total-val gold-text" id="cart-total">$0.00</span>
    </div>
    <button class="checkout-btn">CHECKOUT →</button>
    <div class="cart-free-ship">Free shipping on orders over $50</div>
  </div>
</div>

<script>
/* ── DATA ──────────────────────────────────────────────────── */
const PRODUCTS = [
  {
    id: 'og-box',
    name: 'THE OG BOX',
    subtitle: 'Original Variety Pack',
    tagline: 'All 3 flavors. Zero compromises.',
    price: 34.99,
    comparePrice: 44.99,

    ],
    nutrition: { calories: 80, protein: '10g', sugar: '2g', fiber: '5g' },
    isSour: true,
  },
];

/* ── STATE ─────────────────────────────────────────────────── */
let cart = [];
let currentProduct = null;
let currentGalleryIdx = 0;
let currentQty = 1;
let subSave = false;

/* ── TICKER ────────────────────────────────────────────────── */
const tickerItems = ['10G PROTEIN','★','CHILDHOOD. UPGRADED.','★','NO ARTIFICIAL JUNK','★','LOW SUGAR','★','REAL CANDY TASTE','★','GLUTEN FREE','★'];
const track = document.getElementById('ticker-track');
[...tickerItems,...tickerItems,...tickerItems,...tickerItems].forEach(text => {
  const s = document.createElement('span');
  s.className = 'ticker-item gold-text';
  s.textContent = text;
  track.appendChild(s);
});

/* ── TRUST STRIP ───────────────────────────────────────────── */
[
  {icon:'🧬', label:'No Artificial\nJunk'},
  {icon:'⚡', label:'10g Protein\nPer Pack'},
  {icon:'🍬', label:'Real Candy\nTaste'},
  {icon:'🌿', label:'Gluten\nFree'},
  {icon:'🔬', label:'3rd Party\nTested'},
].forEach((item, i) => {
  const d = document.createElement('div');
  d.className = 'trust-item';
  d.style.animation = `fadeSlideUp .5s ease-out ${.3+i*.1}s both`;

  document.getElementById('trust-strip').appendChild(d);
});

/* ── SHOP GRID ─────────────────────────────────────────────── */
function renderShopGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  PRODUCTS.forEach((p, idx) => {
    const accent = p.isSour ? '#ffe600' : '#e8b820';
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animation = `fadeSlideUp .6s ease-out ${idx*.15}s both`;
    card.innerHTML = `
      <div class="card-image" style="background:radial-gradient(circle at 50% 60%,${p.isSour?'rgba(255,230,0,.08)':'rgba(168,28,28,.08)'},#0a0a0a)">
        <div class="card-gummies">
          ${p.flavors.map((f,i) => `
            <div class="card-gummy" style="
              background:radial-gradient(circle at 30% 30%,${f.color}cc,${f.color}88);
              box-shadow:0 8px 24px ${f.color}44,inset 0 2px 4px rgba(255,255,255,.3);
              top:${[20,80,40][i]}px; left:${[10,70,130][i]}px;
              transform:rotate(${i*8}deg); --r:${i*12-10}deg;
            "></div>
          `).join('')}
        </div>
        <div class="save-badge">SAVE $${(p.comparePrice-p.price).toFixed(0)}</div>
        ${p.isSour?'<div class="sour-badge">😝 SOUR</div>':''}
      </div>
      <div class="card-info">
        <div class="card-subtitle" style="color:${accent}">${p.subtitle}</div>
        <h2 class="card-name gold-text">${p.name}</h2>
        <p class="card-tagline">${p.tagline}</p>
        <div class="card-flavors">
          ${p.flavors.map(f=>`
            <div class="flavor-pill" style="background:${f.color}15;border:1px solid ${f.color}40">
              <div class="flavor-dot-sm" style="background:${f.color};box-shadow:0 0 6px ${f.color}88"></div>
              <span class="flavor-pill-name" style="color:${f.color}">${f.name}</span>
            </div>
          `).join('')}
        </div>
        <div class="card-bottom">
          <div class="card-price-wrap">
            <span class="card-price gold-text">$${p.price.toFixed(2)}</span>
            <span class="card-compare">$${p.comparePrice.toFixed(2)}</span>
          </div>
          <div class="card-view-btn">VIEW →</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => showProductDetail(p));
    grid.appendChild(card);
  });
}

/* ── GALLERY ───────────────────────────────────────────────── */
function getImages(p) {
  const accent = p.isSour ? '#ffe600' : '#e8b820';
  return [
    { color: accent,     type: 'hero' },
    ...p.flavors.map(f => ({ color: f.color, type: 'flavor' })),
    { color: '#e8b820',  type: 'nutrition' },
  ];
}

function renderGalleryMain(p, idx) {
  const imgs = getImages(p);
  const img = imgs[idx];
  const accent = p.isSour ? '#ffe600' : '#e8b820';
  const mainEl = document.getElementById('gallery-main');
  const content = document.getElementById('gallery-main-content');
  mainEl.style.background = `radial-gradient(circle at 50% 50%,${img.color}12,#0a0a0a)`;

  if (img.type === 'hero') {
    content.innerHTML = `
      <div style="position:relative;width:160px;height:200px">
        ${p.flavors.map((f,i)=>`
          <div style="
            position:absolute;width:80px;height:80px;border-radius:20px;
            background:radial-gradient(circle at 30% 30%,${f.color}dd,${f.color}88);
            box-shadow:0 12px 32px ${f.color}55,inset 0 3px 6px rgba(255,255,255,.35);
            top:${[-20,50,10][i]}px;left:${[-40,30,100][i]}px;
            transform:rotate(${i*15-15}deg);
            animation:floatGummy ${2+i*.3}s ease-in-out infinite alternate;
          "></div>
        `).join('')}
        <div style="
          position:absolute;top:0;left:0;
          width:160px;height:200px;border-radius:20px;
          background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
          border:2px solid ${accent}44;
          display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
          z-index:2;
        ">
          <span style="
            background:linear-gradient(180deg,#fce588,#f5d44b,#e8b820,#c49518);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            font-family:'Oswald',sans-serif;font-size:18px;font-weight:900;letter-spacing:.04em;
          ">POPPiT</span>
          <span style="color:${accent};font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em">
            ${p.isSour?'SOUR VARIETY':'ORIGINAL VARIETY'}
          </span>
        </div>
      </div>`;
  } else if (img.type === 'nutrition') {
    content.innerHTML = `
      <div style="background:#fff;border-radius:12px;padding:24px;width:200px;color:#111;font-family:'Courier New',monospace;">
        <div style="font-weight:900;font-size:16px;border-bottom:8px solid #111;padding-bottom:4px;margin-bottom:4px">Nutrition Facts</div>
        <div style="font-size:11px;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:3px">Serving Size 1 pack (28g)</div>
        ${[['Calories',p.nutrition.calories],['Protein',p.nutrition.protein],['Total Sugar',p.nutrition.sugar],['Fiber',p.nutrition.fiber]].map(([l,v])=>`
          <div style="display:flex;justify-content:space-between;font-size:11px;border-bottom:1px solid #eee;padding:2px 0">
            <span style="font-weight:${l==='Calories'?900:400}">${l}</span>
            <span style="font-weight:700">${v}</span>
          </div>
        `).join('')}
      </div>`;
  } else {
    content.innerHTML = `
      <div style="
        width:100px;height:100px;border-radius:24px;
        background:radial-gradient(circle at 30% 30%,${img.color}dd,${img.color}66);
        box-shadow:0 16px 40px ${img.color}44,inset 0 4px 8px rgba(255,255,255,.3);
        animation:floatGummy 2s ease-in-out infinite alternate;
      "></div>`;
  }
  document.getElementById('gallery-counter').textContent = `${idx+1} / ${imgs.length}`;
}

function renderGalleryThumbs(p, activeIdx) {
  const thumbsEl = document.getElementById('gallery-thumbs');
  thumbsEl.innerHTML = '';
  getImages(p).forEach((img, i) => {
    const btn = document.createElement('button');
    btn.className = 'gallery-thumb' + (i===activeIdx?' active':'');
    btn.style.background = `radial-gradient(circle,${img.color}18,#1a1a1a)`;
    btn.innerHTML = `<div class="thumb-dot" style="background:${img.color}"></div>`;
    btn.addEventListener('click', () => {
      currentGalleryIdx = i;
      renderGalleryMain(p, i);
      renderGalleryThumbs(p, i);
    });
    thumbsEl.appendChild(btn);
  });
}

/* ── PRODUCT DETAIL ────────────────────────────────────────── */
function showProductDetail(p) {
  currentProduct = p;
  currentGalleryIdx = 0;
  currentQty = 1;
  subSave = false;

  document.getElementById('view-shop').style.display = 'none';
  const viewProd = document.getElementById('view-product');
  viewProd.style.display = 'block';
  viewProd.style.animation = 'fadeSlideUp .4s ease-out both';
  window.scrollTo(0, 0);

  const accent = p.isSour ? '#ffe600' : '#e8b820';
  const accentBg = p.isSour ? 'rgba(255,230,0,.12)' : 'rgba(232,184,32,.12)';
  const accentBorder = p.isSour ? 'rgba(255,230,0,.3)' : 'rgba(232,184,32,.3)';

  renderGalleryMain(p, 0);
  renderGalleryThumbs(p, 0);

  document.getElementById('info-col').innerHTML = `
    <div class="detail-subtitle" style="color:${accent}">${p.subtitle} — 12 PACKS</div>
    <h1 class="detail-name gold-text">${p.name}</h1>
    <div class="detail-stars">
      <div class="stars-row">${'<span class="star-icon">★</span>'.repeat(5)}</div>
      <span class="detail-stars-note">Coming Soon — Be First to Review</span>
    </div>
    <p class="detail-desc">${p.description}</p>
    <div class="highlights-list">
      ${p.highlights.map(h=>`
        <div class="highlight-row">
          <div class="highlight-icon-box" style="background:${accentBg};border:1px solid ${accentBorder}">${h.icon}</div>
          <div>
            <span class="highlight-label" style="color:${accent}">${h.label}</span>
            <span class="highlight-detail">— ${h.detail}</span>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="whats-box">
      <div class="whats-box-label">What's in the box</div>
      ${p.flavors.map(f=>`
        <div class="whats-row">
          <div class="whats-left">
            <div class="whats-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color}66"></div>
            <span class="whats-name">${f.name}</span>
          </div>
          <span class="whats-count">×${f.count} packs</span>
        </div>
      `).join('')}
    </div>
    <div class="purchase-toggle">
      <button class="toggle-btn" id="btn-onetime"
        style="border:2px solid ${accent};background:${accentBg}"
        onclick="setPurchaseType(false)">
        <span class="toggle-btn-label" style="color:${accent}">ONE-TIME</span>
        <span class="toggle-btn-price">$${p.price.toFixed(2)}</span>
      </button>
      <button class="toggle-btn" id="btn-sub"
        style="border:2px solid #2a2a2a;background:transparent"
        onclick="setPurchaseType(true)">
        <span class="toggle-btn-label" style="color:rgba(245,245,240,.55)">SUBSCRIBE & SAVE 15%</span>
        <span class="toggle-btn-price">$${(p.price*.85).toFixed(2)} / month</span>
      </button>
    </div>
    <div class="purchase-row">
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-display" id="qty-display">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <button class="add-to-cart-btn" id="atc-btn" onclick="addToCart()">
        ADD TO CART — $${p.price.toFixed(2)}
      </button>
    </div>
    <div class="sub-note" id="sub-note" style="display:none">Ships every 30 days. Cancel anytime. No commitment.</div>
    <div class="no-junk-strip">
      ${['No Fillers','No Artificial Flavors','No GMO','Gluten Free','Low Sugar'].map(t=>`<span class="no-junk-tag">✓ ${t}</span>`).join('')}
    </div>
  `;
}

function setPurchaseType(isSub) {
  subSave = isSub;
  if (!currentProduct) return;
  const accent = currentProduct.isSour ? '#ffe600' : '#e8b820';
  const accentBg = currentProduct.isSour ? 'rgba(255,230,0,.12)' : 'rgba(232,184,32,.12)';
  const btnOT = document.getElementById('btn-onetime');
  const btnSub = document.getElementById('btn-sub');

  if (!subSave) {
    btnOT.style.border = `2px solid ${accent}`;
    btnOT.style.background = accentBg;
    btnOT.querySelector('.toggle-btn-label').style.color = accent;
    btnSub.style.border = '2px solid #2a2a2a';
    btnSub.style.background = 'transparent';
    btnSub.querySelector('.toggle-btn-label').style.color = 'rgba(245,245,240,.55)';
    const tag = btnSub.querySelector('.best-value-tag');
    if (tag) tag.remove();
    document.getElementById('sub-note').style.display = 'none';
  } else {
    btnSub.style.border = `2px solid ${accent}`;
    btnSub.style.background = accentBg;
    btnSub.querySelector('.toggle-btn-label').style.color = accent;
    btnOT.style.border = '2px solid #2a2a2a';
    btnOT.style.background = 'transparent';
    btnOT.querySelector('.toggle-btn-label').style.color = 'rgba(245,245,240,.55)';
    if (!btnSub.querySelector('.best-value-tag')) {
      const tag = document.createElement('div');
      tag.className = 'best-value-tag';
      tag.textContent = 'BEST VALUE';
      btnSub.appendChild(tag);
    }
    document.getElementById('sub-note').style.display = 'block';
  }
  refreshATCBtn();
}

function changeQty(delta) {
  currentQty = Math.max(1, currentQty + delta);
  document.getElementById('qty-display').textContent = currentQty;
  refreshATCBtn();
}

function refreshATCBtn() {
  if (!currentProduct) return;
  const price = subSave ? currentProduct.price * .85 : currentProduct.price;
  document.getElementById('atc-btn').textContent = `ADD TO CART — $${(price * currentQty).toFixed(2)}`;
}

function addToCart() {
  if (!currentProduct) return;
  const unitPrice = subSave
    ? parseFloat((currentProduct.price * .85).toFixed(2))
    : currentProduct.price;
  cart.push({ product: currentProduct, quantity: currentQty, subscription: subSave, unitPrice });
  refreshCartUI();
  openCart();
}

/* ── CART ──────────────────────────────────────────────────── */
function refreshCartUI() {
  const total = cart.reduce((s,i) => s + i.quantity, 0);
  const badge = document.getElementById('cart-badge');
  badge.style.display = total > 0 ? 'flex' : 'none';
  badge.textContent = total;

  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');

  if (cart.length === 0) {
    list.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">YOUR CART IS EMPTY</div></div>`;
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'block';
  list.innerHTML = '';
  cart.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'cart-item';
    el.innerHTML = `
      <div class="cart-item-header">
        <div>
          <div class="cart-item-name gold-text">${item.product.name}</div>
          ${item.subscription ? '<span class="sub-tag">SUBSCRIBE & SAVE 15%</span>' : ''}
        </div>
        <button class="cart-remove" onclick="removeCartItem(${i})">✕</button>
      </div>
      <div class="cart-item-bottom">
        <div class="cart-qty">
          <button class="cart-qty-btn" onclick="setCartQty(${i},${item.quantity-1})">−</button>
          <div class="cart-qty-num">${item.quantity}</div>
          <button class="cart-qty-btn" onclick="setCartQty(${i},${item.quantity+1})">+</button>
        </div>
        <span class="cart-item-price gold-text">$${(item.unitPrice*item.quantity).toFixed(2)}</span>
      </div>`;
    list.appendChild(el);
  });

  const cartTotal = cart.reduce((s,i) => s + i.unitPrice * i.quantity, 0);
  document.getElementById('cart-total').textContent = `$${cartTotal.toFixed(2)}`;
}

function removeCartItem(idx) { cart.splice(idx,1); refreshCartUI(); }
function setCartQty(idx, qty) {
  if (qty < 1) { removeCartItem(idx); return; }
  cart[idx].quantity = qty;
  refreshCartUI();
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

/* ── NAV ───────────────────────────────────────────────────── */
function showShopView() {
  document.getElementById('view-shop').style.display = 'block';
  document.getElementById('view-product').style.display = 'none';
  currentProduct = null;
  window.scrollTo(0,0);
}
function goHome() { window.location.href = 'index.html'; }

/* ── INIT ──────────────────────────────────────────────────── */
renderShopGrid();
refreshCartUI();
</script>

</html>
